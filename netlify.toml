# Landing page only — this repo also holds the Capsule React Native app at
# the root (its own package.json, native modules, etc.), which Netlify must
# never try to build. `base` scopes the build context to landing/, so
# Netlify only looks for a package.json there (there isn't one — it's plain
# static HTML/CSS/JS) and never touches the RN app's dependencies.
[build]
  base = "landing"
  publish = "."

  # Skip the deploy entirely when a commit doesn't touch landing/ — most
  # commits in this repo are app-side (screens, migrations, edge functions)
  # and would otherwise trigger a wasted redeploy of an unchanged site.
  # git diff --quiet exits 0 (skip) when there's no diff, 1 (build) when
  # there is; cwd here is `base`, so "." means the landing/ directory.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ."
